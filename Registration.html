<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Registration for reward system</title>
	<link rel="stylesheet" type="text/css" href="Registration.css">
</head>
<body>
    <div class="form">
      <div class="title">Register here</div>
      <div class="input-container ic1">
        <input id="Id" class="input" type="number" placeholder=" " required/>
        <div class="cut"></div>
        <label for="Id" class="placeholder">Id</label>
      </div>
      <div class="input-container ic2">
        <input id="Name" class="input" type="text" placeholder=" " required/>
        <div class="cut"></div>
        <label for="Name" class="placeholder"> Name</label>
      </div>
      <div class="input-container ic2">
        <input id="Student's branch" class="input" type="text" placeholder=" " required/>
        <div class="cut cut-short"></div>
        <label for="Student's branch" class="placeholder">Student's branch</>
      
    </div>
    <div class="input-container ic1">
            <input id="Academic year" class="input" type="number"  min="2017" max="2024" placeholder=" " required/>
            <div class="cut cut-short"></div>
            <label for="Academic year" class="placeholder">Academic year</>
          </div>
      <button type="text" class="submit">submit</button>
    </div>
    </body>
    </html>
